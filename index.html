<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDWAUGE.VIP | Catálogo de Streaming Profesional</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

  <header class="bg-white shadow-xs py-4 px-6 flex justify-between items-center border-b border-gray-100">
    <h1 class="text-2xl font-black text-amber-500 tracking-wider">EDWAUGE.VIP</h1>
    <button onclick="let pin = prompt('🔐 Ingrese su PIN de acceso:'); if(pin) validarPinAcceso(pin);" class="bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-bold px-4 py-2 rounded-xl transition-all flex items-center gap-1">
      👤 Admin / Revendedor
    </button>
  </header>

  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="flex overflow-x-auto max-w-6xl mx-auto items-center justify-between gap-1 px-2 scrollbar-none">
      <button id="tab-CO" onclick="cambiarPais('CO')" class="tab-button flex-1 py-4 text-center font-bold text-xs sm:text-sm border-b-2 border-amber-500 text-amber-600 transition-all whitespace-nowrap">
        🇨🇴 Catálogo Colombia
      </button>
      <button id="tab-MX" onclick="cambiarPais('MX')" class="tab-button flex-1 py-4 text-center font-bold text-xs sm:text-sm border-b-2 border-transparent text-gray-400 hover:text-gray-700 transition-all whitespace-nowrap">
        🇲🇽 Catálogo México
      </button>
      <button id="tab-AR" onclick="cambiarPais('AR')" class="tab-button flex-1 py-4 text-center font-bold text-xs sm:text-sm border-b-2 border-transparent text-gray-400 hover:text-gray-700 transition-all whitespace-nowrap">
        🇦🇷 Catálogo Argentina
      </button>
      <button id="tab-USDEUR" onclick="cambiarPais('USDEUR')" class="tab-button flex-1 py-4 text-center font-bold text-xs sm:text-sm border-b-2 border-transparent text-gray-400 hover:text-gray-700 transition-all whitespace-nowrap">
        🌍 Catálogo USD-EUR
      </button>
    </div>
  </nav>

  <div id="selector-moneda-us"></div>

  <main class="max-w-6xl mx-auto px-4 py-6 flex-1 w-full grid grid-cols-1 lg:grid-cols-3 gap-6">
    
    <section class="lg:col-span-2">
      <h2 class="text-lg font-black text-gray-800 mb-4 flex items-center gap-2">
        ✨ Servicios Disponibles
      </h2>
      <div id="contenedor-productos" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <p class="text-center text-gray-400 py-8 text-sm col-span-2">Conectando con la base de datos en tiempo real...</p>
      </div>
    </section>

    <section class="bg-white rounded-2xl p-4 shadow-xs border border-gray-100 h-fit sticky top-20">
      <h2 class="text-base font-black text-gray-800 border-b border-gray-100 pb-3 mb-3 flex items-center justify-between">
        <span>🛒 Tu Pedido</span>
        <span class="text-xs bg-gray-100 text-gray-600 font-bold px-2 py-0.5 rounded-md">Carrito</span>
      </h2>

      <div id="items-carrito" class="space-y-3 max-h-[350px] overflow-y-auto pr-1">
        <p class="text-center text-gray-400 py-6 text-xs">El carrito está vacío.</p>
      </div>

      <div class="border-t border-gray-100 mt-4 pt-4 space-y-3">
        <div class="flex justify-between items-center">
          <span class="text-sm font-bold text-gray-500">Total a Pagar:</span>
          <span id="total-carrito" class="text-xl font-black text-gray-900">COP $0</span>
        </div>
        
        <button onclick="obtenerProductoWhatsApp()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-3 rounded-xl transition-all shadow-sm flex items-center justify-center gap-2 text-sm cursor-pointer">
          💬 Solicitar por WhatsApp
        </button>
      </div>
    </section>

  </main>

  <footer class="bg-white border-t border-gray-100 py-4 text-center text-xs text-gray-400 mt-8">
    &copy; 2026 Edwauge.Vip · Catálogo Profesional de Servicios Digitales en la Nube.
  </footer>

  <script src="script.js"></script>
</body>
</html>
