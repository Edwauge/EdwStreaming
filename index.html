<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edwauge.Vip - Streaming Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    @keyframes subtle-pulse {
      0%, 100% { border-color: rgba(234, 179, 8, 0.3); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
      50% { border-color: rgba(234, 179, 8, 0.8); box-shadow: 0 10px 15px -3px rgba(234, 179, 8, 0.1); }
    }
    .oferta-animada {
      animation: subtle-pulse 3s infinite;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col font-sans select-none antialiased">

  <header class="bg-white/90 backdrop-blur border-b border-gray-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <span class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-yellow-600 to-amber-500">
          EDWAUGE.VIP
        </span>
      </div>
      <button onclick="abrirLoginAdmin()" class="bg-gray-100 hover:bg-yellow-100 text-gray-700 hover:text-yellow-800 text-xs font-bold px-4 py-2 rounded-xl border border-gray-200 hover:border-yellow-300 transition-all flex items-center space-x-2">
        <i class="fa-solid fa-user-gear text-gray-500"></i>
        <span>Admin</span>
      </button>
    </div>
  </header>

  <div class="bg-white border-b border-gray-200 sticky top-[69px] z-30 shadow-xs">
    <div class="max-w-4xl mx-auto flex justify-around overflow-x-auto whitespace-nowrap">
      <button id="tab-CO" onclick="cambiarPais('CO')" class="flex-1 py-4 px-3 text-center font-bold text-sm sm:text-base border-b-2 border-yellow-500 text-yellow-600 transition-all">
        汇 Colombia
      </button>
      <button id="tab-MX" onclick="cambiarPais('MX')" class="flex-1 py-4 px-3 text-center font-bold text-sm sm:text-base border-b-2 border-transparent text-gray-400 hover:text-gray-700 transition-all">
        🇲🇽 México
      </button>
      <button id="tab-AR" onclick="cambiarPais('AR')" class="flex-1 py-4 px-3 text-center font-bold text-sm sm:text-base border-b-2 border-transparent text-gray-400 hover:text-gray-700 transition-all">
        🇦🇷 Argentina
      </button>
      <button id="tab-USDEUR" onclick="cambiarPais('USDEUR')" class="flex-1 py-4 px-3 text-center font-bold text-sm sm:text-base border-b-2 border-transparent text-gray-400 hover:text-gray-700 transition-all">
        🌍 USD-EUR
      </button>
    </div>
  </div>

  <main class="flex-grow max-w-7xl w-full mx-auto px-6 py-8">
    
    <div id="vista-seleccion-rol" class="max-w-md mx-auto my-16 bg-white border border-gray-200 rounded-3xl p-8 text-center shadow-xl">
      <h3 class="text-lg font-bold mb-6 text-gray-700 tracking-tight">Selecciona tu tipo de perfil para continuar:</h3>
      <div class="space-y-3">
        <button onclick="seleccionarRol('cliente')" class="w-full bg-yellow-400/90 hover:bg-yellow-400 text-gray-900 font-extrabold py-4 rounded-2xl shadow-sm hover:shadow-md transition-all transform hover:-translate-y-0.5">
          <i class="fa-solid fa-user text-sm mr-2 opacity-80"></i> Soy Cliente
        </button>
        <button onclick="abrirModalPinRol()" class="w-full bg-gray-50 hover:bg-gray-100 text-gray-700 font-bold py-4 rounded-2xl border border-gray-200 transition-all transform hover:-translate-y-0.5">
          <i class="fa
